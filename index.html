<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Հարց սիրո մասին</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Դու սիրում ես ինձ՞</h1>
        <img id="cat" src="images/cat.png" alt="Cat">
        <div class="buttons">
            <button onclick="answer('yes')">Հա</button>
            <button onclick="answer('love')">Առանց քեզ կյանք չունեմ</button>
            <button onclick="answer('no')">Չէ</button>
        </div>
        <div id="message"></div>
        <img id="heart" src="images/heart.png" alt="Heart" class="hidden">
    </div>
    <script src="script.js"></script>
