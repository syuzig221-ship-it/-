<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<title>💖</title>

<style>
  /* Գլխավոր կարգավորումներ */
  body {
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh; /* Կենտրոնում տեղավորելու համար */
    text-align: center;
  }

  h1 {
    font-size: 32px;
    color: white;
    margin-bottom: 20px;
  }

  button {
    padding: 15px 30px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  button:hover {
    transform: scale(1.1);
  }

  #result {
    margin-top: 30px;
    font-size: 26px;
    line-height: 1.5;
    color: #fff;
  }

  #cat {
    width: 150px;
    margin-top: 20px;
    display: none;
    position: relative;
  }

  /* Սրտիկների ոճ */
  .heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: fall 3s linear infinite, sway 2s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes fall {
    0% { top: -30px; opacity: 1; }
    100% { top: 100vh; opacity: 0; }
  }

  @keyframes sway {
    0% { transform: translateX(0); }
    100% { transform: translateX(20px); }
  }

  /* Center content on phone screens */
  @media (max-width: 600px) {
    h1 { font-size: 28px; }
    #result { font-size: 22px; }
    #cat { width: 120px; }
    button { font-size: 16px; padding: 12px 24px; }
  }
</style>
</head>

<body>

<h1>Դու սիրում ես ինձ՞ 💖</h1>

<button onclick="answer()">Հա</button>
<button onclick="answer()">Առանց քեզ կյանք չունեմ</button>

<div id="result"></div>

<!-- Պարի կատու (gif) -->
<img id="cat" src="https://media.giphy.com/media/13borq7Zo2kulO/giphy.gif">

<script>
function answer() {
  // Տեքստ
  document.getElementById("result").innerHTML =
    "Ես էլ քեզ եմ սիրում 💕😘<br>Դու իմ ամենասիրելի մարդն ես 💖💋<br>Իմ սիրտը միայն քեզ համար է ❤️";

  // Կատուն ցույց տալ
  const cat = document.getElementById("cat");
  cat.style.display = "block";

  // Սրտիկներ
  setInterval(createHeart, 200);
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "💖";
  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.fontSize = 18 + Math.random() * 12 + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 3000);
}
</script>

</body>
</html>
